apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    project: roboshop
    tier: frontend
    env: dev
    #purpose: rs-demo

spec:
  # modify replicas according to your case
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      env: dev
      #purpose: replicaset
    
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        env: dev
        #purpose: replicaset
    spec:
      containers:
      - name: nginx
        image: nginx:{{ .Values.deployment.imageVesion }}

